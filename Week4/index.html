<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Product Cards</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <button>Home</button>
                <button>Shop</button>
                <button>About</button>
                <button>Contact</button>
            </div>
        </nav>
        <main class="grid-container">

        <div class="card">
            <img src="./headwear.png" alt="headwear">
            <div class="card-content">
                <h2>Random Hat</h2>
                <p>Get a random hat!</p>
                <button>Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="./top.png" alt="top">
            <div class="card-content">
                <h2>Random Top</h2>
                <p>Get a random top!</p>
                <button>Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="./bottom.png" alt="bottoms">
            <div class="card-content">
                <h2>Random Bottoms</h2>
                <p>Get a random pair of bottoms!</p>
                <button>Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="./shoe.png" alt="shoes">
            <div class="card-content">
                <h2>Random Shoes</h2>
                <p>Get a random pair of shoes!</p>
                <button>Buy</button>
            </div>
        </div>

    </main>
    </body>
</html>
